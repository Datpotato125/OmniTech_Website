<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Account — OmniTech</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { background: var(--dark); }

    /* ── Layout ── */
    .dash-wrap {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100vh;
      padding-top: 64px;
    }

    /* ── Sidebar ── */
    .sidebar {
      position: fixed;
      top: 64px;
      left: 0;
      width: 240px;
      height: calc(100vh - 64px);
      background: rgba(255,255,255,0.02);
      border-right: 1px solid rgba(255,255,255,0.06);
      overflow-y: auto;
      z-index: 90;
      display: flex;
      flex-direction: column;
    }

    .sidebar-user {
      padding: 24px 20px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .sidebar-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    .sidebar-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--white);
      line-height: 1.3;
    }

    .sidebar-role {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--cyan);
      text-transform: uppercase;
      margin-top: 4px;
    }

    .sidebar-plan {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      padding: 3px 8px;
      background: rgba(0,102,255,0.15);
      border: 1px solid rgba(0,102,255,0.3);
      border-radius: 2px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      color: rgba(0,102,255,0.9);
      text-transform: uppercase;
    }

    .sidebar-nav {
      padding: 16px 0;
      flex: 1;
    }

    .sidebar-section-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
      padding: 8px 20px 4px;
    }

    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 20px;
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
      border-left: 2px solid transparent;
      user-select: none;
    }

    .sidebar-link:hover {
      color: var(--white);
      background: rgba(255,255,255,0.03);
    }

    .sidebar-link.active {
      color: var(--cyan);
      border-left-color: var(--cyan);
      background: rgba(0,255,255,0.04);
    }

    .sidebar-link .icon {
      width: 16px;
      text-align: center;
      font-size: 12px;
      opacity: 0.7;
    }

    .sidebar-bottom {
      padding: 16px 20px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .btn-signout {
      width: 100%;
      padding: 9px 16px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 2px;
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      font-family: var(--mono);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-signout:hover {
      border-color: rgba(255,80,80,0.5);
      color: rgba(255,100,100,0.8);
    }

    /* ── Main content ── */
    .dash-main {
      margin-left: 240px;
      padding: 40px 48px;
      min-height: calc(100vh - 64px);
    }

    .dash-panel { display: none; }
    .dash-panel.active { display: block; }

    /* ── Panel header ── */
    .panel-header {
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .panel-header .label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .panel-header h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--white);
    }

    .panel-header p {
      font-size: 14px;
      color: rgba(255,255,255,0.4);
      margin-top: 6px;
    }

    /* ── Stat cards ── */
    .stat-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 2px;
      padding: 20px;
    }

    .stat-card .stat-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .stat-card .stat-val {
      font-size: 28px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .stat-card .stat-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      margin-top: 6px;
    }

    .stat-card .stat-delta {
      display: inline-block;
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 2px;
      margin-top: 6px;
    }

    .stat-delta.up { background: rgba(0,204,102,0.15); color: #00cc66; }
    .stat-delta.down { background: rgba(255,68,68,0.12); color: #ff6666; }

    /* ── Info grid ── */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    .info-block {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 2px;
      padding: 24px;
    }

    .info-block h3 {
      font-size: 13px;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-family: var(--mono);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 13px;
    }

    .info-row:last-child { border-bottom: none; }

    .info-row .key {
      color: rgba(255,255,255,0.4);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.05em;
    }

    .info-row .val {
      color: var(--white);
      text-align: right;
    }

    /* ── Storage bar ── */
    .storage-bar-wrap {
      margin-top: 12px;
    }

    .storage-label-row {
      display: flex;
      justify-content: space-between;
      font-family: var(--mono);
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 8px;
    }

    .storage-bar {
      height: 6px;
      background: rgba(255,255,255,0.07);
      border-radius: 3px;
      overflow: hidden;
    }

    .storage-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--blue), var(--cyan));
      border-radius: 3px;
      transition: width 1s ease;
    }

    /* ── Device list ── */
    .device-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .device-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 2px;
    }

    .device-item-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .device-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--cyan);
      animation: pulse 2.5s ease-in-out infinite;
    }

    .device-dot.offline { background: rgba(255,255,255,0.2); animation: none; }

    .device-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--white);
    }

    .device-meta {
      font-family: var(--mono);
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      margin-top: 2px;
      letter-spacing: 0.05em;
    }

    .device-status {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .device-status.online { color: var(--cyan); }
    .device-status.offline { color: rgba(255,255,255,0.25); }

    /* ── Data table ── */
    .data-table-wrap {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .data-table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .data-table-title {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
    }

    .data-table-badge {
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 8px;
      background: rgba(0,255,255,0.08);
      border: 1px solid rgba(0,255,255,0.2);
      color: var(--cyan);
      border-radius: 2px;
    }

    table.dt {
      width: 100%;
      border-collapse: collapse;
    }

    table.dt th {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      text-align: left;
      padding: 10px 20px;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    table.dt td {
      font-size: 13px;
      color: rgba(255,255,255,0.75);
      padding: 12px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    table.dt tr:last-child td { border-bottom: none; }

    table.dt tr:hover td { background: rgba(255,255,255,0.02); }

    .tag {
      display: inline-block;
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 2px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .tag-green { background: rgba(0,204,102,0.12); color: #00cc66; border: 1px solid rgba(0,204,102,0.2); }
    .tag-blue { background: rgba(0,102,255,0.12); color: #4d94ff; border: 1px solid rgba(0,102,255,0.2); }
    .tag-cyan { background: rgba(0,255,255,0.08); color: var(--cyan); border: 1px solid rgba(0,255,255,0.2); }
    .tag-orange { background: rgba(255,165,0,0.1); color: #ffaa44; border: 1px solid rgba(255,165,0,0.2); }
    .tag-red { background: rgba(255,68,68,0.1); color: #ff6666; border: 1px solid rgba(255,68,68,0.2); }
    .tag-gray { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.1); }

    /* ── Activity log ── */
    .activity-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .activity-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .activity-item:last-child { border-bottom: none; }

    .activity-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 4px;
      flex-shrink: 0;
    }

    .activity-text {
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      flex: 1;
    }

    .activity-time {
      font-family: var(--mono);
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    /* ── Admin chart bar ── */
    .mini-chart {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 48px;
      margin-top: 8px;
    }

    .mini-bar {
      flex: 1;
      background: linear-gradient(180deg, var(--cyan), var(--blue));
      border-radius: 2px 2px 0 0;
      opacity: 0.7;
      min-height: 4px;
      transition: opacity 0.2s;
    }

    .mini-bar:hover { opacity: 1; }

    /* ── Payment card ── */
    .payment-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 2px;
      margin-bottom: 10px;
    }

    .payment-card-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .payment-card-icon {
      width: 40px;
      height: 26px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 9px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.05em;
    }

    .payment-card-number {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--white);
      letter-spacing: 0.08em;
    }

    .payment-card-exp {
      font-family: var(--mono);
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      margin-top: 2px;
    }

    /* ── Security items ── */
    .security-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .security-item:last-child { border-bottom: none; }

    .security-item-left h4 {
      font-size: 13px;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 3px;
    }

    .security-item-left p {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
    }

    .toggle-btn {
      padding: 6px 14px;
      border-radius: 2px;
      font-size: 11px;
      font-family: var(--mono);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid rgba(0,255,255,0.25);
      background: rgba(0,255,255,0.06);
      color: var(--cyan);
      transition: all 0.2s;
    }

    .toggle-btn:hover {
      background: rgba(0,255,255,0.12);
      border-color: var(--cyan);
    }

    /* ── Responsive ── */
    @media (max-width: 1100px) {
      .info-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 900px) {
      .dash-wrap { grid-template-columns: 1fr; }
      .sidebar { position: relative; width: 100%; height: auto; top: 0; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.06); }
      .dash-main { margin-left: 0; padding: 28px 20px; }
    }

    @media (max-width: 600px) {
      .stat-row { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>

  function renderPanel(id) {
    document.querySelectorAll('.sidebar-link').forEach(l => {
      l.classList.toggle('active', l.dataset.panel === id);
    });

    const main = document.getElementById('dash-main');
    const panels = {
      'overview':        renderOverview,
      'devices':         renderDevices,
      'storage':         renderStorage,
      'payments':        renderPayments,
      'security':        renderSecurity,
      'activity':        renderActivity,
      'profile':         renderProfile,
      'admin-overview':  renderAdminOverview,
      'admin-users':     renderAdminUsers,
      'admin-products':  renderAdminProducts,
      'admin-reviews':   renderAdminReviews,
      'admin-finance':   renderAdminFinance,
      'admin-system':    renderAdminSystem,
    };

    if (panels[id]) main.innerHTML = panels[id]();
    else main.innerHTML = '<p style="color:var(--muted);">Panel not found.</p>';
  }

          { name: 'OmniCloud CDN',           status: 'Operational', latency: '4ms'  },
          { name: 'Federated Learning Jobs', status: 'Operational', latency: 'N/A'  },
        ].map(s => `
          <div class="security-item">
            <div class="security-item-left">
              <h4>${s.name}</h4>
              <p>Latency: ${s.latency} &nbsp;·&nbsp; All regions healthy</p>
            </div>
            <span class="tag tag-green">${s.status}</span>
          </div>
        `).join('')}
      </div>

      <div class="info-block">
        <h3>Security Monitor</h3>
        ${[
          { event: 'Zero-trust perimeter check — all endpoints passed', time: '2 min ago',  ok: true },
          { event: 'OmniChip HSM key rotation completed across fleet',  time: '1 hour ago', ok: true },
          { event: 'Federated learning round completed — 0 data egress', time: '3 hours ago', ok: true },
          { event: 'Automated vulnerability scan — 0 critical findings', time: '6 hours ago', ok: true },
          { event: 'SSL certificate renewal — all domains updated',     time: '2026-04-25', ok: true },
        ].map(e => `
          <div class="activity-item">
            <div class="activity-dot" style="background:#00cc66;"></div>
            <span class="activity-text">${e.event}</span>
            <span class="activity-time">${e.time}</span>
          </div>
        `).join('')}
      </div>
    `;
  }

  // ═══════════════════════════════════════════════════════════
  //  SIGN OUT
  // ═══════════════════════════════════════════════════════════
  function signOut() {
    localStorage.removeItem('omni_session');
    sessionStorage.removeItem('omni_session');
    window.location.href = 'signin.html';
  }
  </script>

</body>
